<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Join BookWise today</p>
    </div>

    @if (errorMessage()) {
      <p-message severity="error" [text]="errorMessage()" styleClass="w-full" />
    }

    <form (ngSubmit)="onRegister()" class="auth-form">
      <div class="form-row">
        <div class="form-field">
          <label for="firstName" class="form-label">First Name</label>
          <input
            pInputText
            id="firstName"
            type="text"
            [ngModel]="firstName()"
            (ngModelChange)="firstName.set($event)"
            name="firstName"
            placeholder="First name"
            class="w-full" />
        </div>

        <div class="form-field">
          <label for="lastName" class="form-label">Last Name</label>
          <input
            pInputText
            id="lastName"
            type="text"
            [ngModel]="lastName()"
            (ngModelChange)="lastName.set($event)"
            name="lastName"
            placeholder="Last name"
            class="w-full" />
        </div>
      </div>

      <div class="form-field">
        <label for="username" class="form-label">Username</label>
        <input
          pInputText
          id="username"
          type="text"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          placeholder="Choose a username"
          class="w-full" />
      </div>

      <div class="form-field">
        <label for="email" class="form-label">Email</label>
        <input
          pInputText
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="Enter your email"
          class="w-full" />
      </div>

      <div class="form-field">
        <label for="password" class="form-label">Password</label>
        <p-password
          id="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="Create a password"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full" />
      </div>

      <p-button
        type="submit"
        label="Create Account"
        styleClass="w-full"
        [loading]="isLoading"
        [disabled]="isLoading || !email() || !username() || !password() || !firstName() || !lastName()" />
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login" class="auth-link">Sign in</a>
    </p>
  </div>
</div>
