<header class="header">
  <div class="header-container">
    <a routerLink="/home" class="logo">BookWise</a>
    <nav class="nav">
      <a routerLink="/home" routerLinkActive="active" class="nav-link">Home</a>
      @if (isLoggedIn()) {
        <a [routerLink]="['/profile', userId()]" routerLinkActive="active" class="nav-link">{{ username() }}</a>
        <p-button label="Logout" [text]="true" severity="secondary" (onClick)="onLogout()" />
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Login</a>
        <a routerLink="/register" routerLinkActive="active" class="nav-link">Register</a>
      }
    </nav>
  </div>
</header>
